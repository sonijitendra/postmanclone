databases:
  - name: postman-clone-db
    plan: free
    databaseName: postman_clone
    user: postman_user

services:
  - type: web
    name: postman-clone-api
    runtime: python
    region: oregon
    buildCommand: "pip install --prefer-binary -r requirements.txt && alembic upgrade head && python seed.py"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: postman-clone-db
          property: connectionURI
      - key: CORS_ORIGINS
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: DEFAULT_TIMEOUT
        value: "30"
    healthCheckPath: /api/v1/health
